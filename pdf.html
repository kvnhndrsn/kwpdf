<script>
// Configure PDF.js Worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// 1. GLOBAL STATE
// Note: KEYWORDS is now managed by keywords.js or the manager below
let objectUrls = [];
let activeKeyword = "";
const VIEWER_PATH = 'pdfjs/web/viewer.html';

// DOM Elements
const frame = document.getElementById('pdfFrame');
const resultsArea = document.getElementById('results');
const progressBar = document.getElementById('progressBar');
const sidebar = document.getElementById('sidebar');

// 2. KEYWORD MANAGER LOGIC
function toggleKeywordManager() {
    const modal = document.getElementById('keywordManager');
    const area = document.getElementById('keywordInput');
    if (modal.style.display === 'none' || modal.style.display === '') {
        area.value = KEYWORDS.join('\n');
        modal.style.display = 'flex';
    } else {
        modal.style.display = 'none';
    }
}

function updateKeywordsFromUI() {
    const area = document.getElementById('keywordInput');

    // 1. Update the global variable in memory
    window.KEYWORDS = area.value.split('\n').map(k => k.trim()).filter(k => k !== "");

    // 2. Save to browser storage so it survives a refresh
    if (typeof saveKeywords === "function") {
        saveKeywords();
    } else {
        localStorage.setItem('tender_keywords', JSON.stringify(window.KEYWORDS));
    }

    toggleKeywordManager();

    // 3. Visual confirmation
    console.log("Active Keywords:", window.KEYWORDS);
    alert("Keywords updated! Ready to scan with " + window.KEYWORDS.length + " terms.");
}

// 3. SCANNING ENGINE
async function processFiles(files) {
    if (files.length === 0) return;

    // Reset UI
    resultsArea.innerHTML = `<p class="scanning-msg">Scanning ${files.length} documents...</p>`;
    progressBar.style.width = '0%';

    // Clear previous URLs to save memory
    objectUrls.forEach(url => URL.revokeObjectURL(url));
    objectUrls = [];

    // Create optimized Regex
    const combinedRegex = new RegExp(KEYWORDS.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|'), 'gi');

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const url = URL.createObjectURL(file);
        objectUrls.push(url);

        try {
            const pdf = await pdfjsLib.getDocument({ url, verbosity: 0 }).promise;
            let text = "";
            for (let p = 1; p <= pdf.numPages; p++) {
                const page = await pdf.getPage(p);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + " ";
            }

            const matches = text.match(combinedRegex) || [];
            const counts = {};
            matches.forEach(match => {
                const lowerMatch = match.toLowerCase();
                const originalKey = KEYWORDS.find(k => k.toLowerCase() === lowerMatch) || lowerMatch;
                counts[originalKey] = (counts[originalKey] || 0) + 1;
            });

            renderCard(file.name, counts, url);
        } catch (err) {
            console.error("Error scanning:", file.name, err);
        }
        progressBar.style.width = `${Math.round(((i + 1) / files.length) * 100)}%`;
    }
    resultsArea.querySelector('.scanning-msg')?.remove();
}

// 4. DRAG AND DROP
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
    sidebar.addEventListener(name, (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (name === 'dragover') sidebar.style.background = "#f0f7ff";
        if (name === 'dragleave' || name === 'drop') sidebar.style.background = "white";
    }, false);
});

sidebar.addEventListener('drop', async (e) => {
    // 1. IMMEDIATELY capture entries into a static array.
    // If you 'await' before doing this, the browser clears the items list.
    const entries = [];
    if (e.dataTransfer.items) {
        for (let i = 0; i < e.dataTransfer.items.length; i++) {
            const entry = e.dataTransfer.items[i].webkitGetAsEntry();
            if (entry) entries.push(entry);
        }
    }

    let filesToProcess = [];

    // 2. Now you can safely 'await' while iterating through your static array
    for (const entry of entries) {
        if (entry.isFile && entry.name.toLowerCase().endsWith('.zip')) {
            const zipFile = await new Promise((resolve) => entry.file(resolve));
            const zippedPdfs = await extractPdfsFromZip(zipFile);
            filesToProcess = filesToProcess.concat(zippedPdfs);
        } else {
            await traverseFileTree(entry, filesToProcess);
        }
    }

    if (filesToProcess.length > 0) {
        processFiles(filesToProcess);
    }
});

async function traverseFileTree(item, fileList) {
    if (item.isFile && item.name.toLowerCase().endsWith('.pdf')) {
        const file = await new Promise((resolve) => item.file(resolve));
        fileList.push(file);
    } else if (item.isDirectory) {
        const dirReader = item.createReader();
        const entries = await new Promise((resolve) => dirReader.readEntries(resolve));
        for (let entry of entries) {
            await traverseFileTree(entry, fileList);
        }
    }
}

// 5. FILE INPUT CHANGE
document.getElementById('folderInput').addEventListener('change', async (e) => {
    let filesToProcess = [];
    const selectedFiles = Array.from(e.target.files);

    for (const file of selectedFiles) {
        if (file.name.toLowerCase().endsWith('.zip')) {
            const zippedPdfs = await extractPdfsFromZip(file);
            filesToProcess = filesToProcess.concat(zippedPdfs);
        } else if (file.name.toLowerCase().endsWith('.pdf')) {
            filesToProcess.push(file);
        }
    }
    processFiles(filesToProcess);
});

// 6. UI & VIEWER LOGIC
function renderCard(name, counts, url) {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.onclick = () => { setActiveCard(card); loadPDF(url); };
    card.innerHTML = `<div class="doc-name">${name}</div>`;

    const grid = document.createElement('div');
    grid.className = 'badge-grid';

    KEYWORDS.forEach(k => {
        const count = counts[k] || 0;
        if (count > 0) {
            const b = document.createElement('div');
            b.className = 'badge';
            b.textContent = `${k}: ${count}`;
            b.onclick = (e) => {
                e.stopPropagation();
                setActiveCard(card);
                if (frame.dataset.currentUrl === url) {
                    findInViewer(k);
                } else {
                    loadPDF(url, k);
                }
            };
            grid.appendChild(b);
        }
    });
    card.appendChild(grid);
    resultsArea.appendChild(card);
}

function loadPDF(fileUrl, keyword = "") {
    frame.dataset.currentUrl = fileUrl;
    activeKeyword = "";
    const searchParam = keyword ? `#search=${encodeURIComponent(keyword)}&phrase=true` : "";
    frame.src = `${VIEWER_PATH}?file=${encodeURIComponent(fileUrl)}${searchParam}`;
    frame.onload = () => {
        setTimeout(() => { if (keyword) findInViewer(keyword); }, 1000);
    };
}

let isSearching = false;
function findInViewer(query) {
    const viewerWin = frame.contentWindow;
    if (!viewerWin || isSearching) return;
    isSearching = true;
    const isAgain = (query === activeKeyword);
    activeKeyword = query;
    viewerWin.postMessage({ type: 'find', query: query, again: isAgain }, '*');
    setTimeout(() => { isSearching = false; }, 400);
    frame.focus();
}

function setActiveCard(card) {
    document.querySelectorAll('.doc-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
}

// --- 7. THE BULLETPROOF RESIZER ---
(function() {
    const resizer = document.getElementById("resizer");
    const sidebar = document.getElementById("sidebar") || document.querySelector(".sidebar");
    const pdfFrame = document.getElementById("pdfFrame");

    if (!resizer || !sidebar) {
        console.error("Resizer error: Sidebar or Resizer element not found in HTML.");
        return;
    }

    resizer.addEventListener("mousedown", (e) => {
        e.preventDefault();
        document.body.classList.add("dragging");

        const startX = e.clientX;
        const startWidth = sidebar.offsetWidth;

        function onMouseMove(e) {
            // Calculate new width relative to the start position
            const newWidth = startWidth + (e.clientX - startX);

            // Set hard limits so you don't accidentally "lose" the sidebar
            if (newWidth > 150 && newWidth < 900) {
                sidebar.style.width = newWidth + "px";
                sidebar.style.flexBasis = newWidth + "px"; // Added for Flexbox stability
            }
        }

        function onMouseUp() {
            document.body.classList.remove("dragging");
            window.removeEventListener("mousemove", onMouseMove);
            window.removeEventListener("mouseup", onMouseUp);

            // Sync the PDF viewer only ONCE at the end to prevent horizontal jumping
            if (pdfFrame && pdfFrame.contentWindow) {
                pdfFrame.contentWindow.postMessage({ type: 'setscale', value: 'page-width' }, '*');
            }
        }

        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("mouseup", onMouseUp);
    });
})();

async function extractPdfsFromZip(zipFile) {
    const zip = await JSZip.loadAsync(zipFile);
    const extractedFiles = [];
    const promises = [];

    zip.forEach((relativePath, zipEntry) => {
        // Ignore directories and non-PDF files
        if (!zipEntry.dir && relativePath.toLowerCase().endsWith('.pdf')) {
            const promise = zipEntry.async("blob").then(blob => {
                // We wrap the blob in a File object so it retains its name
                const file = new File([blob], zipEntry.name, { type: "application/pdf" });
                extractedFiles.push(file);
            });
            promises.push(promise);
        }
    });

    await Promise.all(promises);
    return extractedFiles;
}

</script>
